name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx nx format:check --base="remotes/origin/main"
      # This workspace isn't connected to Nx Cloud, so e2e (not the Cloud-only atomized
      # e2e-ci) runs directly on this runner — slower, but works without an Nx Cloud account.
      - run: npx nx run-many -t lint test build typecheck e2e
