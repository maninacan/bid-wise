server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache hashed build assets aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html references the current hashed bundle, so it must never be cached —
  # otherwise browsers can keep serving a stale page pointing at an old (or missing) bundle
  # indefinitely after a deploy.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback — client-side routing serves index.html for unknown paths
  location / {
    try_files $uri $uri/ /index.html;
  }
}
