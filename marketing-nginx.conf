server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Astro emits hashed assets under /_astro/ — cache them forever
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Clean-URL fallback for a statically prerendered Astro site
  location / {
    try_files $uri $uri/index.html $uri.html /index.html;
  }
}
